services: 
  app:

    build:
      context: .
      dockerfile: Dockerfile 
    container_name: ms-gestionusuarios-container  
    ports:
      - "8080:8080"
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker     
    healthcheck:
      test: ["CMD","curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
  